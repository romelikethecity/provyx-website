<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="600" y="50" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#1B2A4A" text-anchor="middle">Provider Segmentation Filters</text>

  <!-- Filter panel (left) -->
  <rect x="60" y="80" width="380" height="490" rx="16" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="60" y="80" width="380" height="50" rx="16" fill="#1B2A4A"/>
  <rect x="60" y="114" width="380" height="16" fill="#1B2A4A"/>
  <text x="250" y="112" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Build Your Target List</text>

  <!-- Specialty filter -->
  <text x="90" y="168" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A">SPECIALTY</text>
  <rect x="90" y="178" width="320" height="36" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="106" y="201" font-family="system-ui,sans-serif" font-size="13" fill="#334155">Dental, Chiropractic, Mental Health</text>
  <rect x="370" y="186" width="20" height="20" rx="4" fill="#0EA5E9" opacity="0.15"/>
  <text x="375" y="201" font-family="system-ui,sans-serif" font-size="12" fill="#0EA5E9">3</text>

  <!-- Geography filter -->
  <text x="90" y="248" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A">GEOGRAPHY</text>
  <rect x="90" y="258" width="320" height="36" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="106" y="281" font-family="system-ui,sans-serif" font-size="13" fill="#334155">Texas, Florida, California</text>
  <rect x="370" y="266" width="20" height="20" rx="4" fill="#16a34a" opacity="0.15"/>
  <text x="375" y="281" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">3</text>

  <!-- Practice Size filter -->
  <text x="90" y="328" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A">PRACTICE SIZE</text>
  <g transform="translate(90,340)">
    <rect width="100" height="28" rx="14" fill="#0EA5E9" opacity="0.12"/>
    <text x="50" y="19" font-family="system-ui,sans-serif" font-size="12" fill="#0EA5E9" text-anchor="middle">Solo (1)</text>
  </g>
  <g transform="translate(200,340)">
    <rect width="100" height="28" rx="14" fill="#0EA5E9"/>
    <text x="50" y="19" font-family="system-ui,sans-serif" font-size="12" fill="#fff" text-anchor="middle">Small (2-5)</text>
  </g>
  <g transform="translate(310,340)">
    <rect width="100" height="28" rx="14" fill="#0EA5E9" opacity="0.12"/>
    <text x="50" y="19" font-family="system-ui,sans-serif" font-size="12" fill="#0EA5E9" text-anchor="middle">Mid (6-20)</text>
  </g>

  <!-- Technology filter -->
  <text x="90" y="408" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A">TECHNOLOGY STACK</text>
  <rect x="90" y="418" width="320" height="36" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="106" y="441" font-family="system-ui,sans-serif" font-size="13" fill="#334155">Dentrix, Open Dental</text>

