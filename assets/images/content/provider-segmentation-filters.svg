    <circle cx="22" cy="22" r="14" fill="#0EA5E9" opacity="0.2"/>
    <text x="48" y="18" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#1B2A4A">Bright Smile Dental</text>
    <text x="48" y="35" font-family="system-ui,sans-serif" font-size="11" fill="#64748B">Dental | Austin, TX | Solo | Dentrix</text>
    <rect x="420" y="10" width="80" height="24" rx="12" fill="#16a34a" opacity="0.12"/>
    <text x="460" y="27" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a" text-anchor="middle">Verified</text>
  </g>
  <g transform="translate(590,314)">
