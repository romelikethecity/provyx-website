    <circle cx="22" cy="22" r="14" fill="#16a34a" opacity="0.2"/>
    <text x="48" y="18" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#1B2A4A">Calm Mind Counseling</text>
    <text x="48" y="35" font-family="system-ui,sans-serif" font-size="11" fill="#64748B">Mental Health | Miami, FL | Small (3) | TherapyNotes</text>
    <rect x="420" y="10" width="80" height="24" rx="12" fill="#16a34a" opacity="0.12"/>
    <text x="460" y="27" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a" text-anchor="middle">Verified</text>
  </g>
  <g transform="translate(590,368)">
    <rect width="520" height="44" rx="6" fill="#F8FAFC"/>
    <circle cx="22" cy="22" r="14" fill="#0EA5E9" opacity="0.2"/>
    <text x="48" y="18" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#1B2A4A">Peak Chiropractic Wellness</text>
    <text x="48" y="35" font-family="system-ui,sans-serif" font-size="11" fill="#64748B">Chiropractic | Los Angeles, CA | Solo | ChiroTouch</text>
    <rect x="420" y="10" width="80" height="24" rx="12" fill="#16a34a" opacity="0.12"/>
    <text x="460" y="27" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a" text-anchor="middle">Verified</text>
  </g>
  <g transform="translate(590,422)">
    <rect width="520" height="44" rx="6" fill="#fff"/>
    <circle cx="22" cy="22" r="14" fill="#16a34a" opacity="0.2"/>
    <text x="48" y="18" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#1B2A4A">Family First Dental Group</text>
    <text x="48" y="35" font-family="system-ui,sans-serif" font-size="11" fill="#64748B">Dental | Houston, TX | Small (4) | Open Dental</text>
    <rect x="420" y="10" width="80" height="24" rx="12" fill="#16a34a" opacity="0.12"/>
    <text x="460" y="27" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a" text-anchor="middle">Verified</text>
  </g>

  <!-- Export button -->
  <rect x="590" y="490" width="160" height="40" rx="8" fill="#0EA5E9"/>
  <text x="670" y="516" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Export to CSV</text>
  <rect x="770" y="490" width="160" height="40" rx="8" fill="rgba(14,165,233,0.12)"/>
  <text x="850" y="516" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0EA5E9" text-anchor="middle">Enrich All</text>
</svg>