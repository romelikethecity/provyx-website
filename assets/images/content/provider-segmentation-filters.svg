  <text x="90" y="488" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A">OWNERSHIP TYPE</text>
  <g transform="translate(90,500)">
    <rect width="140" height="28" rx="14" fill="#16a34a"/>
    <text x="70" y="19" font-family="system-ui,sans-serif" font-size="12" fill="#fff" text-anchor="middle">Independent</text>
  </g>
  <g transform="translate(240,500)">
    <rect width="80" height="28" rx="14" fill="#16a34a" opacity="0.12"/>
    <text x="40" y="19" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a" text-anchor="middle">DSO</text>
  </g>
  <g transform="translate(330,500)">
    <rect width="80" height="28" rx="14" fill="#16a34a" opacity="0.12"/>
    <text x="40" y="19" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a" text-anchor="middle">PE</text>
  </g>

  <!-- Arrow -->
  <line x1="460" y1="310" x2="520" y2="310" stroke="#0EA5E9" stroke-width="3"/>
  <polygon points="520,300 540,310 520,320" fill="#0EA5E9"/>

  <!-- Results panel (right) -->
  <rect x="560" y="80" width="580" height="490" rx="16" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="560" y="80" width="580" height="50" rx="16" fill="#0EA5E9"/>
  <rect x="560" y="114" width="580" height="16" fill="#0EA5E9"/>
  <text x="850" y="112" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3,847 Matching Providers</text>

  <!-- Result stats -->
  <g transform="translate(590,150)">
    <rect width="160" height="80" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="80" y="35" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#0EA5E9" text-anchor="middle">2,104</text>
    <text x="80" y="55" font-family="system-ui,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">With email</text>
  </g>
  <g transform="translate(770,150)">
    <rect width="160" height="80" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="80" y="35" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#16a34a" text-anchor="middle">3,201</text>
    <text x="80" y="55" font-family="system-ui,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">With phone</text>
  </g>
  <g transform="translate(950,150)">
    <rect width="160" height="80" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="80" y="35" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#1B2A4A" text-anchor="middle">1,847</text>
    <text x="80" y="55" font-family="system-ui,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">With LinkedIn</text>
  </g>

