    <g transform="translate(20,222)">
      <rect width="220" height="40" rx="6" fill="#16a34a" opacity="0.05"/>
      <text x="16" y="25" font-family="system-ui,sans-serif" font-size="13" fill="#1B2A4A">Track engagement metrics</text>
    </g>
    <g transform="translate(20,282)">
      <rect width="220" height="80" rx="8" fill="#1B2A4A"/>
      <text x="110" y="24" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#16a34a" text-anchor="middle">INTEGRATIONS</text>
      <text x="110" y="46" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">Salesforce, HubSpot</text>
      <text x="110" y="64" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">CSV, API, Direct Upload</text>
    </g>
    <g transform="translate(20,380)">
      <text x="110" y="16" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#16a34a" text-anchor="middle">3x</text>
      <text x="110" y="40" font-family="system-ui,sans-serif" font-size="13" fill="#64748B" text-anchor="middle">better connect rates</text>
    </g>
  </g>
  <!-- Arrow 3 -->
  <g transform="translate(950,310)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#1B2A4A" stroke-width="2.5" stroke-dasharray="5,3"/>
    <polygon points="36,-6 48,0 36,6" fill="#1B2A4A"/>
  </g>
  <!-- Phase 4 -->
  <g transform="translate(1000,70)">
    <rect width="160" height="520" rx="12" fill="#1B2A4A"/>
    <text x="80" y="36" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">RESULT</text>
    <text x="80" y="100" font-family="system-ui,sans-serif" font-size="60" font-weight="800" fill="#0EA5E9" text-anchor="middle" transform="rotate(-90,80,280)">PIPELINE</text>
    <g transform="translate(20,430)">
      <rect width="120" height="70" rx="8" fill="rgba(14,165,233,0.15)"/>
      <text x="60" y="30" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#0EA5E9" text-anchor="middle">ROI</text>
      <text x="60" y="52" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">Measurable</text>
    </g>
