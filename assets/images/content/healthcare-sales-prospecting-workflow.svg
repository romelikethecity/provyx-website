    <g transform="translate(20,380)">
      <text x="110" y="16" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#1B2A4A" text-anchor="middle">95%</text>
      <text x="110" y="40" font-family="system-ui,sans-serif" font-size="13" fill="#64748B" text-anchor="middle">data accuracy rate</text>
