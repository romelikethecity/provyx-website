      <text x="110" y="46" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">Email, Phone, NPI, Address</text>
      <text x="110" y="64" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">Website, EHR, Practice Size</text>
