  <!-- Arrow 2 -->
  <g transform="translate(630,310)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="5,3"/>
    <polygon points="36,-6 48,0 36,6" fill="#16a34a"/>
