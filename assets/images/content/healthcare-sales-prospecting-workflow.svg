      <text x="16" y="25" font-family="system-ui,sans-serif" font-size="13" fill="#1B2A4A">Append practice intel</text>
    </g>
    <g transform="translate(20,222)">
      <rect width="220" height="40" rx="6" fill="#1B2A4A" opacity="0.03"/>
      <text x="16" y="25" font-family="system-ui,sans-serif" font-size="13" fill="#1B2A4A">Verify every record</text>
