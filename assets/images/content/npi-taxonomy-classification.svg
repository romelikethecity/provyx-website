<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="600" y="45" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#1B2A4A" text-anchor="middle">NPI Taxonomy Classification System</text>

  <!-- Root node -->
  <rect x="440" y="70" width="320" height="60" rx="12" fill="#1B2A4A"/>
  <text x="600" y="106" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">CMS NPI Registry (2.4M+ Records)</text>

  <!-- Branch lines from root -->
  <line x1="500" y1="130" x2="500" y2="160" stroke="#0EA5E9" stroke-width="2"/>
  <line x1="700" y1="130" x2="700" y2="160" stroke="#16a34a" stroke-width="2"/>

  <!-- Type 1: Individual -->
  <rect x="260" y="160" width="480" height="50" rx="10" fill="#0EA5E9" opacity="0.1" stroke="#0EA5E9" stroke-width="1.5"/>
  <circle cx="290" cy="185" r="14" fill="#0EA5E9"/>
  <text x="290" y="190" font-family="system-ui,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">1</text>
  <text x="315" y="190" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1B2A4A">Type 1: Individual Providers</text>
  <text x="580" y="190" font-family="system-ui,sans-serif" font-size="13" fill="#64748B">Doctors, therapists, dentists</text>

  <!-- Type 2: Organization -->
  <rect x="460" y="160" width="480" height="50" rx="10" fill="#16a34a" opacity="0.1" stroke="#16a34a" stroke-width="1.5"/>
  <circle cx="490" cy="185" r="14" fill="#16a34a"/>
  <text x="490" y="190" font-family="system-ui,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">2</text>
  <text x="515" y="190" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1B2A4A">Type 2: Organizations</text>
  <text x="750" y="190" font-family="system-ui,sans-serif" font-size="13" fill="#64748B">Practices, clinics, hospitals</text>

  <!-- Branch lines from Type 1 -->
  <line x1="200" y1="210" x2="200" y2="260" stroke="#0EA5E9" stroke-width="1.5"/>
  <line x1="200" y1="260" x2="80" y2="260" stroke="#0EA5E9" stroke-width="1.5"/>
  <line x1="200" y1="260" x2="200" y2="260" stroke="#0EA5E9" stroke-width="1.5"/>
  <line x1="200" y1="260" x2="330" y2="260" stroke="#0EA5E9" stroke-width="1.5"/>

  <!-- Type 1 taxonomy branches -->
  <!-- Dental -->
  <rect x="40" y="250" width="180" height="70" rx="8" fill="#fff" stroke="#0EA5E9" stroke-width="1"/>
  <text x="130" y="275" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A" text-anchor="middle">Dental (122300)</text>
  <text x="130" y="295" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">General, Ortho, Endo, Perio</text>

  <!-- Mental Health -->
  <rect x="240" y="250" width="180" height="70" rx="8" fill="#fff" stroke="#0EA5E9" stroke-width="1"/>
  <text x="330" y="275" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A" text-anchor="middle">Mental Health (101Y)</text>
  <text x="330" y="295" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Psych, LCSW, LPC, LMFT</text>

  <!-- Chiropractic -->
  <rect x="40" y="340" width="180" height="70" rx="8" fill="#fff" stroke="#0EA5E9" stroke-width="1"/>
  <text x="130" y="365" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A" text-anchor="middle">Chiropractic (111N)</text>
  <text x="130" y="385" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">DC, Sports, Rehab</text>

  <!-- Primary Care -->
  <rect x="240" y="340" width="180" height="70" rx="8" fill="#fff" stroke="#0EA5E9" stroke-width="1"/>
  <text x="330" y="365" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A" text-anchor="middle">Primary Care (208D)</text>
  <text x="330" y="385" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Family, Internal, Pediatric</text>

  <!-- More branches -->
  <rect x="40" y="430" width="180" height="70" rx="8" fill="#fff" stroke="#0EA5E9" stroke-width="1"/>
  <text x="130" y="455" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A" text-anchor="middle">Dermatology (207N)</text>
  <text x="130" y="475" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Medical, Cosmetic, Surgical</text>

  <rect x="240" y="430" width="180" height="70" rx="8" fill="#fff" stroke="#0EA5E9" stroke-width="1"/>
  <text x="330" y="455" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A" text-anchor="middle">Eye Care (152W)</text>
  <text x="330" y="475" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Optometry, Ophthalmology</text>

  <!-- Connector lines for sub-branches -->
  <line x1="130" y1="320" x2="130" y2="340" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="330" y1="320" x2="330" y2="340" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="130" y1="410" x2="130" y2="430" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="330" y1="410" x2="330" y2="430" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Type 2 branches (right side) -->
  <line x1="800" y1="210" x2="800" y2="260" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="800" y1="260" x2="680" y2="260" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="800" y1="260" x2="940" y2="260" stroke="#16a34a" stroke-width="1.5"/>

  <rect x="620" y="250" width="200" height="70" rx="8" fill="#fff" stroke="#16a34a" stroke-width="1"/>
  <text x="720" y="275" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A" text-anchor="middle">Solo Practice</text>
  <text x="720" y="295" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Single provider offices</text>

  <rect x="840" y="250" width="200" height="70" rx="8" fill="#fff" stroke="#16a34a" stroke-width="1"/>
  <text x="940" y="275" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A" text-anchor="middle">Group Practice</text>
  <text x="940" y="295" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Multi-provider clinics</text>

  <rect x="620" y="340" width="200" height="70" rx="8" fill="#fff" stroke="#16a34a" stroke-width="1"/>
  <text x="720" y="365" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A" text-anchor="middle">Hospital/Health System</text>
  <text x="720" y="385" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Acute care facilities</text>

  <rect x="840" y="340" width="200" height="70" rx="8" fill="#fff" stroke="#16a34a" stroke-width="1"/>
  <text x="940" y="365" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B2A4A" text-anchor="middle">DSO / MSO</text>
  <text x="940" y="385" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">PE-backed organizations</text>

  <line x1="720" y1="320" x2="720" y2="340" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="940" y1="320" x2="940" y2="340" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom: Taxonomy code example -->
  <rect x="500" y="450" width="640" height="140" rx="12" fill="#1B2A4A"/>
  <text x="820" y="485" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Taxonomy Code Anatomy</text>

  <rect x="530" y="505" width="580" height="60" rx="8" fill="rgba(255,255,255,0.08)"/>
  <text x="560" y="535" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#0EA5E9" letter-spacing="4">1223G0001X</text>

  <!-- Code breakdown labels -->
  <text x="565" y="560" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8">Provider</text>
  <text x="650" y="560" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8">Specialty</text>
  <text x="755" y="560" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8">Sub-specialty</text>

  <!-- 140+ specialties label -->
  <rect x="40" y="530" width="420" height="70" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="250" y="560" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#0EA5E9" text-anchor="middle">140+ Specialties Mapped</text>
  <text x="250" y="582" font-family="system-ui,sans-serif" font-size="13" fill="#64748B" text-anchor="middle">Every NPI taxonomy code classified and searchable</text>
</svg>