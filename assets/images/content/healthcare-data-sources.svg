<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="600" y="50" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#1B2A4A" text-anchor="middle">Healthcare Data Sources Pipeline</text>

  <!-- Source boxes (left side) -->
  <!-- NPI Registry -->
  <rect x="60" y="100" width="240" height="100" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="60" y="100" width="240" height="6" rx="3" fill="#0EA5E9"/>
  <circle cx="100" cy="150" r="20" fill="#0EA5E9" opacity="0.15"/>
  <text x="92" y="156" font-family="system-ui,sans-serif" font-size="18" fill="#0EA5E9" font-weight="700">N</text>
  <text x="130" y="145" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1B2A4A">NPI Registry</text>
  <text x="130" y="168" font-family="system-ui,sans-serif" font-size="12" fill="#64748B">2.4M+ active records</text>

  <!-- State Boards -->
  <rect x="60" y="230" width="240" height="100" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="60" y="230" width="240" height="6" rx="3" fill="#16a34a"/>
  <circle cx="100" cy="280" r="20" fill="#16a34a" opacity="0.15"/>
  <text x="92" y="286" font-family="system-ui,sans-serif" font-size="18" fill="#16a34a" font-weight="700">S</text>
  <text x="130" y="275" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1B2A4A">State Licensing Boards</text>
  <text x="130" y="298" font-family="system-ui,sans-serif" font-size="12" fill="#64748B">50 state directories</text>

  <!-- Business Listings -->
  <rect x="60" y="360" width="240" height="100" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="60" y="360" width="240" height="6" rx="3" fill="#0EA5E9"/>
  <circle cx="100" cy="410" r="20" fill="#0EA5E9" opacity="0.15"/>
  <text x="92" y="416" font-family="system-ui,sans-serif" font-size="18" fill="#0EA5E9" font-weight="700">B</text>
  <text x="130" y="405" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1B2A4A">Business Listings</text>
  <text x="130" y="428" font-family="system-ui,sans-serif" font-size="12" fill="#64748B">Google, Yelp, directories</text>

  <!-- Commercial DBs -->
  <rect x="60" y="490" width="240" height="100" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="60" y="490" width="240" height="6" rx="3" fill="#16a34a"/>
  <circle cx="100" cy="540" r="20" fill="#16a34a" opacity="0.15"/>
  <text x="92" y="546" font-family="system-ui,sans-serif" font-size="18" fill="#16a34a" font-weight="700">C</text>
  <text x="130" y="535" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1B2A4A">Commercial Databases</text>
  <text x="130" y="558" font-family="system-ui,sans-serif" font-size="12" fill="#64748B">Premium data partners</text>

  <!-- Arrows -->
  <line x1="300" y1="150" x2="460" y2="290" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="300" y1="280" x2="460" y2="300" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="300" y1="410" x2="460" y2="320" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="300" y1="540" x2="460" y2="340" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Central processing box -->
  <rect x="460" y="220" width="280" height="180" rx="16" fill="#1B2A4A"/>
  <text x="600" y="270" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">Provyx Intelligence</text>
  <text x="600" y="300" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">Engine</text>
  <rect x="500" y="320" width="200" height="32" rx="6" fill="rgba(14,165,233,0.2)"/>
  <text x="600" y="342" font-family="system-ui,sans-serif" font-size="13" fill="#0EA5E9" text-anchor="middle">Multi-source verification</text>
  <rect x="500" y="362" width="200" height="32" rx="6" fill="rgba(22,163,106,0.2)"/>
  <text x="600" y="384" font-family="system-ui,sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">Deduplication + matching</text>

  <!-- Output arrow -->
  <line x1="740" y1="310" x2="860" y2="310" stroke="#0EA5E9" stroke-width="3"/>
  <polygon points="860,300 880,310 860,320" fill="#0EA5E9"/>

  <!-- Output box -->
  <rect x="900" y="200" width="240" height="220" rx="16" fill="#fff" stroke="#0EA5E9" stroke-width="2"/>
  <rect x="900" y="200" width="240" height="50" rx="16" fill="#0EA5E9"/>
  <rect x="900" y="230" width="240" height="20" fill="#0EA5E9"/>
  <text x="1020" y="230" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Clean Output</text>

  <g transform="translate(920,270)">
    <circle cx="8" cy="8" r="6" fill="#16a34a"/>
    <text x="22" y="12" font-family="system-ui,sans-serif" font-size="13" fill="#334155">Verified contacts</text>
  </g>
  <g transform="translate(920,300)">
    <circle cx="8" cy="8" r="6" fill="#16a34a"/>
    <text x="22" y="12" font-family="system-ui,sans-serif" font-size="13" fill="#334155">NPI-matched</text>
  </g>
  <g transform="translate(920,330)">
    <circle cx="8" cy="8" r="6" fill="#16a34a"/>
    <text x="22" y="12" font-family="system-ui,sans-serif" font-size="13" fill="#334155">Practice details</text>
  </g>
  <g transform="translate(920,360)">
    <circle cx="8" cy="8" r="6" fill="#16a34a"/>
    <text x="22" y="12" font-family="system-ui,sans-serif" font-size="13" fill="#334155">Owner + LinkedIn</text>
  </g>
  <g transform="translate(920,390)">
    <circle cx="8" cy="8" r="6" fill="#16a34a"/>
    <text x="22" y="12" font-family="system-ui,sans-serif" font-size="13" fill="#334155">CSV/Excel export</text>
  </g>
</svg>