    <text x="560" y="48" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#0EA5E9" text-anchor="middle">NORTHEAST</text>
    <text x="560" y="130" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#0EA5E9" text-anchor="middle">630K</text>
    <text x="560" y="155" font-family="system-ui,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">providers</text>
