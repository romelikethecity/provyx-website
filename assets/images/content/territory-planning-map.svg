    <g transform="translate(540,310)">
      <rect width="150" height="140" rx="8" fill="#1B2A4A"/>
      <text x="75" y="24" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">TOTAL</text>
      <text x="75" y="60" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#0EA5E9" text-anchor="middle">2.4M+</text>
      <text x="75" y="80" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">providers</text>
      <text x="75" y="108" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#fff" text-anchor="middle">50</text>
      <text x="75" y="128" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">states + DC</text>
