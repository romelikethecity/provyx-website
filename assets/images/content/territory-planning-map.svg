    <g transform="translate(24,140)">
      <rect width="312" height="70" rx="8" fill="rgba(22,163,74,0.1)"/>
      <text x="16" y="24" font-family="system-ui,sans-serif" font-size="12" fill="#94A3B8">Email Coverage</text>
      <text x="16" y="52" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#16a34a">68%</text>
    </g>
    <g transform="translate(24,224)">
      <rect width="312" height="70" rx="8" fill="rgba(14,165,233,0.1)"/>
      <text x="16" y="24" font-family="system-ui,sans-serif" font-size="12" fill="#94A3B8">Phone Coverage</text>
      <text x="16" y="52" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#0EA5E9">92%</text>
    </g>
    <g transform="translate(24,308)">
      <rect width="312" height="70" rx="8" fill="rgba(255,255,255,0.05)"/>
      <text x="16" y="24" font-family="system-ui,sans-serif" font-size="12" fill="#94A3B8">Practice Owner ID Rate</text>
      <text x="16" y="52" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#fff">74%</text>
    </g>
    <g transform="translate(24,392)">
      <rect width="312" height="70" rx="8" fill="rgba(14,165,233,0.15)"/>
      <text x="156" y="28" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0EA5E9" text-anchor="middle">Filter by specialty, size,</text>
      <text x="156" y="50" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0EA5E9" text-anchor="middle">geography, and technology</text>
