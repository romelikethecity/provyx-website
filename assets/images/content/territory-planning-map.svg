    <rect x="30" y="60" width="180" height="200" rx="8" fill="#0EA5E9" opacity="0.1" stroke="#0EA5E9" stroke-width="1.5"/>
    <text x="120" y="48" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#0EA5E9" text-anchor="middle">WEST</text>
    <text x="120" y="130" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#0EA5E9" text-anchor="middle">412K</text>
    <text x="120" y="155" font-family="system-ui,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">providers</text>
    <circle cx="80" y="190" r="6" fill="#0EA5E9"/>
    <text x="92" y="194" font-family="system-ui,sans-serif" font-size="11" fill="#334155">CA: 185K</text>
    <circle cx="80" y="210" r="6" fill="#0EA5E9" opacity="0.6"/>
    <text x="92" y="214" font-family="system-ui,sans-serif" font-size="11" fill="#334155">WA: 42K</text>
    <circle cx="80" y="230" r="6" fill="#0EA5E9" opacity="0.4"/>
    <text x="92" y="234" font-family="system-ui,sans-serif" font-size="11" fill="#334155">OR: 28K</text>
    <!-- Midwest -->
    <rect x="230" y="60" width="180" height="200" rx="8" fill="#1B2A4A" opacity="0.08" stroke="#1B2A4A" stroke-width="1.5"/>
    <text x="320" y="48" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1B2A4A" text-anchor="middle">MIDWEST</text>
    <text x="320" y="130" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#1B2A4A" text-anchor="middle">538K</text>
    <text x="320" y="155" font-family="system-ui,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">providers</text>
    <circle cx="280" y="190" r="6" fill="#1B2A4A"/>
    <text x="292" y="194" font-family="system-ui,sans-serif" font-size="11" fill="#334155">IL: 72K</text>
    <circle cx="280" y="210" r="6" fill="#1B2A4A" opacity="0.6"/>
    <text x="292" y="214" font-family="system-ui,sans-serif" font-size="11" fill="#334155">OH: 65K</text>
    <circle cx="280" y="230" r="6" fill="#1B2A4A" opacity="0.4"/>
    <text x="292" y="234" font-family="system-ui,sans-serif" font-size="11" fill="#334155">MI: 54K</text>
