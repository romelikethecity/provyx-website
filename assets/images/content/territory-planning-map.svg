    <rect x="230" y="290" width="280" height="160" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1.5"/>
    <text x="370" y="278" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#16a34a" text-anchor="middle">SOUTH</text>
    <text x="370" y="350" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#16a34a" text-anchor="middle">820K</text>
    <text x="370" y="375" font-family="system-ui,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">providers</text>
    <circle cx="280" y="410" r="6" fill="#16a34a"/>
    <text x="292" y="414" font-family="system-ui,sans-serif" font-size="11" fill="#334155">TX: 145K</text>
