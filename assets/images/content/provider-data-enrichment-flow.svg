<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#F8FAFC"/>
  <text x="600" y="50" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#1B2A4A" text-anchor="middle">Data Enrichment Pipeline</text>
  <!-- Step 1: Raw NPI -->
  <g transform="translate(60,100)">
    <rect width="200" height="180" rx="12" fill="#1B2A4A"/>
    <text x="100" y="36" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0EA5E9" text-anchor="middle">Step 1</text>
    <text x="100" y="60" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#fff" text-anchor="middle">Raw NPI Data</text>
    <rect x="20" y="80" width="160" height="24" rx="4" fill="rgba(255,255,255,0.08)"/>
    <text x="30" y="96" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8">Name, NPI, Taxonomy</text>
    <rect x="20" y="112" width="160" height="24" rx="4" fill="rgba(255,255,255,0.05)"/>
    <text x="30" y="128" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8">Address, Phone</text>
    <rect x="20" y="144" width="160" height="24" rx="4" fill="rgba(255,255,255,0.08)"/>
    <text x="30" y="160" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8">License State</text>
  </g>
  <!-- Arrow 1 -->
  <g transform="translate(270,180)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#0EA5E9" stroke-width="3" stroke-dasharray="6,4"/>
    <polygon points="55,-8 70,0 55,8" fill="#0EA5E9"/>
  </g>
  <!-- Step 2: Enrich -->
  <g transform="translate(340,100)">
    <rect width="200" height="180" rx="12" fill="#fff" stroke="#0EA5E9" stroke-width="2"/>
    <text x="100" y="36" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0EA5E9" text-anchor="middle">Step 2</text>
    <text x="100" y="60" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#1B2A4A" text-anchor="middle">Enrichment</text>
    <rect x="20" y="80" width="160" height="24" rx="4" fill="#0EA5E9" opacity="0.1"/>
    <text x="30" y="96" font-family="system-ui,sans-serif" font-size="11" fill="#1B2A4A">+ Direct Email</text>
    <rect x="20" y="112" width="160" height="24" rx="4" fill="#0EA5E9" opacity="0.05"/>
    <text x="30" y="128" font-family="system-ui,sans-serif" font-size="11" fill="#1B2A4A">+ Practice Website</text>
    <rect x="20" y="144" width="160" height="24" rx="4" fill="#0EA5E9" opacity="0.1"/>
    <text x="30" y="160" font-family="system-ui,sans-serif" font-size="11" fill="#1B2A4A">+ Technology Stack</text>
  </g>
  <!-- Arrow 2 -->
  <g transform="translate(550,180)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#16a34a" stroke-width="3" stroke-dasharray="6,4"/>
    <polygon points="55,-8 70,0 55,8" fill="#16a34a"/>
  </g>
  <!-- Step 3: Verify -->
  <g transform="translate(620,100)">
    <rect width="200" height="180" rx="12" fill="#fff" stroke="#16a34a" stroke-width="2"/>
    <text x="100" y="36" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#16a34a" text-anchor="middle">Step 3</text>
    <text x="100" y="60" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#1B2A4A" text-anchor="middle">Verification</text>
    <rect x="20" y="80" width="160" height="24" rx="4" fill="#16a34a" opacity="0.1"/>
    <text x="30" y="96" font-family="system-ui,sans-serif" font-size="11" fill="#1B2A4A">Email Validation</text>
    <rect x="20" y="112" width="160" height="24" rx="4" fill="#16a34a" opacity="0.05"/>
    <text x="30" y="128" font-family="system-ui,sans-serif" font-size="11" fill="#1B2A4A">Phone Line Check</text>
    <rect x="20" y="144" width="160" height="24" rx="4" fill="#16a34a" opacity="0.1"/>
    <text x="30" y="160" font-family="system-ui,sans-serif" font-size="11" fill="#1B2A4A">NPI Cross-Ref</text>
  </g>
  <!-- Arrow 3 -->
  <g transform="translate(830,180)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#1B2A4A" stroke-width="3" stroke-dasharray="6,4"/>
    <polygon points="55,-8 70,0 55,8" fill="#1B2A4A"/>
  </g>
  <!-- Step 4: Deliver -->
  <g transform="translate(900,100)">
    <rect width="240" height="180" rx="12" fill="#1B2A4A"/>
    <text x="120" y="36" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#16a34a" text-anchor="middle">Step 4</text>
    <text x="120" y="60" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#fff" text-anchor="middle">Sales-Ready Data</text>
    <rect x="20" y="80" width="200" height="24" rx="4" fill="rgba(255,255,255,0.08)"/>
    <text x="30" y="96" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a">✓ Verified Email</text>
    <rect x="20" y="112" width="200" height="24" rx="4" fill="rgba(255,255,255,0.05)"/>
    <text x="30" y="128" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a">✓ Active Phone</text>
    <rect x="20" y="144" width="200" height="24" rx="4" fill="rgba(255,255,255,0.08)"/>
    <text x="30" y="160" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a">✓ Practice Intel</text>
  </g>
  <!-- Bottom stats bar -->
  <g transform="translate(60,340)">
    <rect width="1080" height="100" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
    <g transform="translate(80,20)">
      <text x="0" y="24" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#0EA5E9">2.4M+</text>
      <text x="0" y="48" font-family="system-ui,sans-serif" font-size="13" fill="#64748B">NPI Records</text>
    </g>
    <g transform="translate(320,20)">
      <text x="0" y="24" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#1B2A4A">140+</text>
      <text x="0" y="48" font-family="system-ui,sans-serif" font-size="13" fill="#64748B">Specialties</text>
    </g>
    <g transform="translate(540,20)">
      <text x="0" y="24" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#16a34a">95%</text>
      <text x="0" y="48" font-family="system-ui,sans-serif" font-size="13" fill="#64748B">Accuracy Rate</text>
    </g>
    <g transform="translate(760,20)">
      <text x="0" y="24" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#0EA5E9">50</text>
      <text x="0" y="48" font-family="system-ui,sans-serif" font-size="13" fill="#64748B">States Covered</text>
    </g>
  </g>
  <!-- Bottom flow labels -->
  <g transform="translate(60,480)">
    <rect width="1080" height="120" rx="12" fill="#1B2A4A"/>
    <text x="540" y="36" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#fff" text-anchor="middle">How It Works</text>
    <g transform="translate(40,56)">
      <circle cx="16" cy="16" r="16" fill="#0EA5E9"/>
      <text x="16" y="21" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">1</text>
      <text x="44" y="21" font-family="system-ui,sans-serif" font-size="13" fill="#CBD5E1">Tell us your ICP</text>
    </g>
    <g transform="translate(300,56)">
      <circle cx="16" cy="16" r="16" fill="#0EA5E9"/>
      <text x="16" y="21" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">2</text>
      <text x="44" y="21" font-family="system-ui,sans-serif" font-size="13" fill="#CBD5E1">We build your list</text>
    </g>
    <g transform="translate(560,56)">
      <circle cx="16" cy="16" r="16" fill="#0EA5E9"/>
      <text x="16" y="21" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">3</text>
      <text x="44" y="21" font-family="system-ui,sans-serif" font-size="13" fill="#CBD5E1">Verify every record</text>
    </g>
    <g transform="translate(820,56)">
      <circle cx="16" cy="16" r="16" fill="#16a34a"/>
      <text x="16" y="21" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">4</text>
      <text x="44" y="21" font-family="system-ui,sans-serif" font-size="13" fill="#CBD5E1">Start selling</text>
    </g>
  </g>
</svg>