<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="600" y="45" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#1B2A4A" text-anchor="middle">Cost Comparison: Provyx vs Enterprise Platforms</text>
  <text x="600" y="72" font-family="system-ui,sans-serif" font-size="14" fill="#64748B" text-anchor="middle">Pay-per-record pricing vs annual contracts</text>

  <!-- Bar chart area -->
  <!-- Y-axis -->
  <text x="55" y="140" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">$200K</text>
  <text x="55" y="220" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">$150K</text>
  <text x="55" y="300" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">$100K</text>
  <text x="55" y="380" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">$50K</text>
  <text x="55" y="460" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">$0</text>

  <!-- Grid lines -->
  <line x1="70" y1="135" x2="700" y2="135" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="70" y1="215" x2="700" y2="215" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="70" y1="295" x2="700" y2="295" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="70" y1="375" x2="700" y2="375" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="70" y1="455" x2="700" y2="455" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Enterprise Platform A bar -->
  <rect x="110" y="135" width="80" height="320" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="150" y="125" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">$200K/yr</text>
  <text x="150" y="485" font-family="system-ui,sans-serif" font-size="12" fill="#1B2A4A" text-anchor="middle">Definitive HC</text>

  <!-- Enterprise Platform B bar -->
  <rect x="230" y="175" width="80" height="280" rx="4" fill="#ef4444" opacity="0.65"/>
  <text x="270" y="165" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">$180K/yr</text>
  <text x="270" y="485" font-family="system-ui,sans-serif" font-size="12" fill="#1B2A4A" text-anchor="middle">IQVIA</text>

  <!-- ZoomInfo bar -->
  <rect x="350" y="375" width="80" height="80" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="390" y="365" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">$50K/yr</text>
  <text x="390" y="485" font-family="system-ui,sans-serif" font-size="12" fill="#1B2A4A" text-anchor="middle">ZoomInfo</text>

  <!-- Apollo bar -->
  <rect x="470" y="415" width="80" height="40" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="510" y="405" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">$24K/yr</text>
  <text x="510" y="485" font-family="system-ui,sans-serif" font-size="12" fill="#1B2A4A" text-anchor="middle">Apollo</text>

  <!-- Provyx bar (much smaller, green) -->
  <rect x="590" y="439" width="80" height="16" rx="4" fill="#16a34a"/>
  <text x="630" y="432" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#16a34a" text-anchor="middle">$2-5K</text>
  <text x="630" y="485" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#1B2A4A" text-anchor="middle">Provyx</text>

  <!-- Right side: comparison details -->
  <rect x="740" y="100" width="400" height="420" rx="16" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="940" y="135" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#1B2A4A" text-anchor="middle">Why Teams Switch</text>

  <!-- Enterprise problems -->
  <g transform="translate(770,155)">
    <rect width="340" height="52" rx="8" fill="#ef4444" opacity="0.06"/>
    <text x="16" y="22" font-family="system-ui,sans-serif" font-size="18" fill="#ef4444">&#x2717;</text>
    <text x="40" y="22" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1B2A4A">Annual contracts ($30K-200K/yr)</text>
    <text x="40" y="42" font-family="system-ui,sans-serif" font-size="11" fill="#64748B">Locked in whether you use it or not</text>
  </g>
  <g transform="translate(770,217)">
    <rect width="340" height="52" rx="8" fill="#ef4444" opacity="0.06"/>
    <text x="16" y="22" font-family="system-ui,sans-serif" font-size="18" fill="#ef4444">&#x2717;</text>
    <text x="40" y="22" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1B2A4A">Generic B2B data for healthcare</text>
    <text x="40" y="42" font-family="system-ui,sans-serif" font-size="11" fill="#64748B">No NPI verification, stale records</text>
  </g>
  <g transform="translate(770,279)">
    <rect width="340" height="52" rx="8" fill="#ef4444" opacity="0.06"/>
    <text x="16" y="22" font-family="system-ui,sans-serif" font-size="18" fill="#ef4444">&#x2717;</text>
    <text x="40" y="22" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1B2A4A">6-8 week onboarding</text>
    <text x="40" y="42" font-family="system-ui,sans-serif" font-size="11" fill="#64748B">Implementation fees, training required</text>
  </g>

  <!-- Provyx advantages -->
  <g transform="translate(770,351)">
    <rect width="340" height="52" rx="8" fill="#16a34a" opacity="0.06"/>
    <text x="16" y="22" font-family="system-ui,sans-serif" font-size="18" fill="#16a34a">&#x2713;</text>
    <text x="40" y="22" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1B2A4A">Pay-per-record, no contracts</text>
    <text x="40" y="42" font-family="system-ui,sans-serif" font-size="11" fill="#64748B">Only pay for what you use</text>
  </g>
  <g transform="translate(770,413)">
    <rect width="340" height="52" rx="8" fill="#16a34a" opacity="0.06"/>
    <text x="16" y="22" font-family="system-ui,sans-serif" font-size="18" fill="#16a34a">&#x2713;</text>
    <text x="40" y="22" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1B2A4A">NPI-verified, healthcare-only</text>
    <text x="40" y="42" font-family="system-ui,sans-serif" font-size="11" fill="#64748B">Built for healthcare from day one</text>
  </g>

  <!-- Bottom CTA bar -->
  <rect x="60" y="540" width="1080" height="70" rx="12" fill="#1B2A4A"/>
  <text x="440" y="582" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">Save 80-95% vs enterprise platforms with better healthcare data accuracy</text>
  <rect x="900" y="558" width="200" height="38" rx="8" fill="#0EA5E9"/>
  <text x="1000" y="582" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Get Pricing</text>
</svg>